# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: doc_ai_redis
    restart: always
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    image: doc_ai_backend:${APP_VERSION:-latest}
    container_name: doc_ai_backend
    restart: always
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    image: doc_ai_backend:${APP_VERSION:-latest}
    container_name: doc_ai_celery
    restart: always
    command: >
      celery -A app.services.processing.celery_app worker
      --loglevel=warning
      --concurrency=4
      --max-tasks-per-child=100
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Celery Beat (optional scheduler) ─────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    image: doc_ai_backend:${APP_VERSION:-latest}
    container_name: doc_ai_celery_beat
    restart: always
    command: >
      celery -A app.services.processing.celery_app beat
      --loglevel=warning
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend (built static + nginx) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ""    # empty → nginx proxies /api on same origin
    image: doc_ai_frontend:${APP_VERSION:-latest}
    container_name: doc_ai_frontend
    restart: always
    networks:
      - internal
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: doc_ai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"   # uncomment TLS section in nginx.conf when ready
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      # Uncomment for TLS certs:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
  nginx_logs:
