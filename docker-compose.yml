# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — DEVELOPMENT
# Usage: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: doc_ai_redis
    restart: unless-stopped
    ports:
      - "6279:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hieunv1103/document-ai-backend:latest
    container_name: doc_ai_backend
    restart: unless-stopped
    # Dev: root avoids bind-mount permission issues on Docker Desktop (Windows)
    user: "0:0"
    # No --reload: uvicorn's reload spawns a child that often fails to import app.main
    # in Docker (works with a single process). Edit code and restart: docker compose restart backend
    working_dir: /app
    # Mount whole backend so /app matches local layout and backend/.env is available; --loop asyncio avoids uvloop edge cases
    command:
      - sh
      - -c
      - |
        set -e
        export PYTHONPATH=/app
        cd /app
        python -c "import app.main"
        exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --loop asyncio
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    ports:
      - "8010:8000"
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hieunv1103/document-ai-celery:latest
    container_name: doc_ai_celery
    restart: unless-stopped
    user: "0:0"
    working_dir: /app
    command: celery -A app.services.processing.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    image: hieunv1103/document-ai-frontend:latest
    container_name: doc_ai_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env.docker
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules   # anonymous volume keeps container node_modules separate
    environment:
      VITE_API_BASE_URL: http://localhost:8000

  # ── One-off: create SA admin user ────────────────────────────────────────
  # Run: docker compose run --rm create_admin
  # Or:  docker compose run --rm create_admin python scripts/create_admin.py \
  #          --email you@company.com --password "YourPass!" --name "Admin"
  create_admin:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hieunv1103/document-ai-create-admin:latest
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/scripts:/app/scripts:ro
    command: python scripts/create_admin.py
    profiles:
      - tools   # only runs when explicitly called
    depends_on:
      - redis

volumes:
  redis_data:
